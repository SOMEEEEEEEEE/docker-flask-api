name: Docker Build Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t flask-api-test .

    - name: Run container test
      run: |
        docker run -d -p 5000:5000 flask-api-test
        sleep 5
        curl localhost:5000