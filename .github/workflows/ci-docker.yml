name: Docker Build Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Prevent job from hanging indefinitely

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t flask-api-test .
    
    # Run container test with cleanup
    - name: Run container test
      run: |
        echo "Starting container..."
        container_id=$(docker run -d -p 5000:5000 flask-api-test)

        echo "Waiting for application to start..."
        sleep 5

        # Fail pipeline if container test fails
        echo "Sending HTTP request to test endpoint..."
        curl -f localhost:5000

        # Stop and remove container after test
        echo "Stopping and removing container..."
        docker stop $container_id
        docker rm $container_id