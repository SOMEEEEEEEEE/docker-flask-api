name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    # Checkout repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # Build Docker image
    - name: Build Docker image
      run: docker build -t flask-api-test .

    # Run container and test service availability
    - name: Run container test
      run: |
        # Start container in detached mode
        container_id=$(docker run -d -p 5000:5000 flask-api-test)
        sleep 5

        # Test endpoint
        curl -f http://localhost:5000

        # Stop and remove container after test
        docker stop $container_id
        docker rm $container_id

    ## CD PART
    # Log in to Docker Hub using GitHub Secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Tag Docker image for Docker Hub
    - name: Tag Docker image
      run: docker tag flask-api-test ${{ secrets.DOCKER_USERNAME }}/flask-api-test:latest

    # Push Docker image to Docker Hub
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-api-test:latest